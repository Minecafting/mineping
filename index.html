<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Wagon Boats MC</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0e1117, #1f232b); /* gradient biar nggak flat */
      color: #fff;
      margin: 0;
      padding: 50px;
      text-align: center;
    }
    header img {
      width: 200px;
    }
    h1 {
      margin-top: 20px;
      color: #4da6ff;
    }
    .owner {
      margin-top: 15px;
      font-size: 16px;
      color: #ffd633;
    }
    .palestine {
      margin-top: 10px;
      font-size: 18px;
      color: #ff4d4d;
      font-weight: bold;
    }
    .palestine img {
      width: 100px;
      margin-top: 10px;
      border-radius: 4px;
    }
    .button {
      display: inline-block;
      margin: 20px;
      padding: 15px 30px;
      background-color: #5865F2;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-size: 18px;
    }
    .button:hover { background-color: #404EED; }
    .marquee {
      margin-top: 30px;
      background: #4da6ff;
      color: #000;
      padding: 10px;
      border-radius: 8px;
      font-weight: bold;
      overflow: hidden;
    }
    .marquee marquee {
      font-size: 18px;
    }
    footer {
      margin-top: 40px;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>
<body>
  <header>
    <img src="boat.png" alt="Logo Wagon Boats MC">
    <h1>Selamat Datang di Portal Wagon Boats MC</h1>
    <div class="owner">👑 Owner: ManyCreeper</div>
    <div class="palestine">
      ✊ Free Palestina<br>
      <img src="palestine.png" alt="Bendera Palestina"> 
    </div>
  </header>

  <!-- Tombol menuju website project -->
  <a class="button" href="https://minecafting.github.io/wagonMC/" target="_blank">🚀 Masuk untuk dapat informasi server </a>

  <!-- Animasi teks berjalan -->
  <div class="marquee">
    <marquee>🌐 IP: wagon-boats.gl.joinmc.link | Terimakasih bagi yang sudah join 🙏</marquee>
  </div>

 <!-- Video trailer server dari YouTube -->
<div style="margin-top:30px;">
  <iframe width="600" height="340" 
    src="https://www.youtube.com/embed/dtHOBPfHD5I" 
    title="YouTube video player" frameborder="0" 
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
    allowfullscreen>
  </iframe>
</div>


  <footer>
    🌍 Komunitas Minecraft Indonesia | Wagon Boats MC © 2026
  </footer>
</body>
</html>
